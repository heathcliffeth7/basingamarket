name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Foundry tests when forge is available
        run: |
          if command -v forge >/dev/null 2>&1; then
            forge test --root contracts
          else
            echo "forge not installed; skipping contract tests"
          fi
